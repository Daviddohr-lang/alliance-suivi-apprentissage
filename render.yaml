services:
  - type: web
    name: alliance-suivi-apprentissage
    runtime: node
    plan: starter
    buildCommand: ""
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /opt/render/project/src/storage
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
    disk:
      name: alliance-data
      mountPath: /opt/render/project/src/storage
      sizeGB: 1
